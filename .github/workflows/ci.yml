name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an older run if a new commit arrives on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # Lint deferred until ESLint 9 + flat-config migration. Next 16
  # removed `next lint` and the @next/eslint-plugin-next rules break
  # when invoked through a plain `eslint` CLI. Tracking separately.
